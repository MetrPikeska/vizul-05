<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vody Čeladné</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet"
  />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f0e8;
      overflow: hidden;
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    #wave-canvas {
      pointer-events: none;
      z-index: 1;
    }

    /* UI overlay — pointerEvents none, nepřekáží animaci */
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 44px 52px 36px;
    }

    #title-block { max-width: 280px; }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a3a5c;
      letter-spacing: 0.03em;
      line-height: 1.05;
    }

    .subtitle {
      font-size: 0.68rem;
      color: #7a8a9c;
      margin-top: 7px;
      font-style: italic;
      letter-spacing: 0.08em;
    }

    .credits {
      font-size: 0.72rem;
      color: #9aaabb;
      text-align: right;
      font-style: italic;
      letter-spacing: 0.05em;
    }

    /* Drobný ukazatel průběhu v levém dolním rohu */
    #progress-label {
      position: fixed;
      bottom: 18px;
      left: 52px;
      font-family: 'Playfair Display', serif;
      font-size: 0.6rem;
      font-style: italic;
      color: #b0bec8;
      letter-spacing: 0.06em;
      pointer-events: none;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <canvas id="map"></canvas>
  <canvas id="wave-canvas"></canvas>

  <div id="overlay">
    <div id="title-block">
      <h1>Vody Čeladné</h1>
      <div class="subtitle" id="bbox-label"></div>
    </div>
    <div class="credits">Petr Mikeska, 2026</div>
  </div>

  <div id="progress-label">kresba&hellip;</div>

  <!-- data.js generováno skriptem preprocess.py -->
  <script src="data.js"></script>
  <script>
  "use strict";

  // ─────────────────────────────────────────
  //  KONFIGURACE
  // ─────────────────────────────────────────
  const PADDING       = 64;       // px okraje
  const BG_COLOR      = '#f5f0e8';
  const COMMUNE_FILL  = '#ece7da';
  const COMMUNE_LINE  = '#c4b89a';
  const COMMUNE_WIDTH = 1.2;

  // Barva toku: prameny → hlavní tok
  const COL_A = [0x1a, 0x3a, 0x5c];   // #1a3a5c — tmavě modrá (prameny)
  const COL_B = [0x4a, 0x7f, 0xa5];   // #4a7fa5 — středně modrá (hlavní tok)

  const WIDTH_MIN  = 0.4;   // tloušťka pramene (px)
  const WIDTH_MAX  = 3.0;   // tloušťka hlavního toku (px)

  // Doba animace jedné depth úrovně (ms).
  // Úrovně s více řekami dostávají více času, aby kresba nevypadala zmateně.
  function levelDurationMs(riverCount) {
    if (riverCount >= 20) return 1400;
    if (riverCount >= 8)  return 1000;
    if (riverCount >= 3)  return 700;
    return 500;
  }

  // Krátká pauza mezi úrovněmi (ms) — vzdechnutí
  const LEVEL_GAP_MS = 80;

  // ─────────────────────────────────────────
  //  CANVAS SETUP
  // ─────────────────────────────────────────
  const canvas = document.getElementById('map');
  const ctx    = canvas.getContext('2d');

  document.getElementById('bbox-label').textContent = BBOX_STR;

  // ─────────────────────────────────────────
  //  VÝPOČET BOUNDS
  // ─────────────────────────────────────────
  let minLon =  Infinity, maxLon = -Infinity;
  let minLat =  Infinity, maxLat = -Infinity;

  function expandBounds(coords) {
    for (const pt of coords) {
      if (pt[0] < minLon) minLon = pt[0];
      if (pt[0] > maxLon) maxLon = pt[0];
      if (pt[1] < minLat) minLat = pt[1];
      if (pt[1] > maxLat) maxLat = pt[1];
    }
  }

  for (const f of RIVERS_DATA.features) {
    const g = f.geometry;
    if (!g) continue;
    if (g.type === 'LineString')
      expandBounds(g.coordinates);
    else if (g.type === 'MultiLineString')
      for (const ln of g.coordinates) expandBounds(ln);
  }
  for (const f of COMMUNE_DATA.features) {
    const g = f.geometry;
    if (!g) continue;
    const rings = g.type === 'Polygon'    ? g.coordinates
                : g.type === 'MultiPolygon' ? g.coordinates.flat()
                : [];
    for (const ring of rings) expandBounds(ring);
  }

  // ─────────────────────────────────────────
  //  PROJEKCE WGS84 → CANVAS
  // ─────────────────────────────────────────
  let project = makeProjection(800, 600);

  function makeProjection(w, h) {
    const lonSpan = maxLon - minLon;
    const latSpan = maxLat - minLat;
    const usableW = w - 2 * PADDING;
    const usableH = h - 2 * PADDING;
    const scale   = Math.min(usableW / lonSpan, usableH / latSpan);
    const ox = PADDING + (usableW - scale * lonSpan) / 2;
    const oy = PADDING + (usableH - scale * latSpan) / 2;
    return (lon, lat) => [
      ox + (lon - minLon) * scale,
      oy + (maxLat - lat) * scale   // Y obráceno
    ];
  }

  // ─────────────────────────────────────────
  //  PŘÍPRAVA DAT
  // ─────────────────────────────────────────
  // Seskupení toků dle depth
  const riversByDepth = Array.from({ length: MAX_DEPTH + 1 }, () => []);

  for (const f of RIVERS_DATA.features) {
    const props = f.properties || {};
    const depth = (props.depth != null) ? Math.min(props.depth, MAX_DEPTH) : 0;
    const g = f.geometry;
    if (!g) continue;

    const lines = g.type === 'MultiLineString' ? g.coordinates
                : g.type === 'LineString'       ? [g.coordinates]
                : [];

    for (const ln of lines) {
      if (ln.length >= 2) riversByDepth[depth].push({ coords: ln, depth });
    }
  }

  // ─────────────────────────────────────────
  //  VIZUÁLNÍ FUNKCE
  // ─────────────────────────────────────────
  function depthColor(depth) {
    const t = MAX_DEPTH > 0 ? depth / MAX_DEPTH : 0;
    const r = Math.round(COL_A[0] + t * (COL_B[0] - COL_A[0]));
    const g = Math.round(COL_A[1] + t * (COL_B[1] - COL_A[1]));
    const b = Math.round(COL_A[2] + t * (COL_B[2] - COL_A[2]));
    return `rgb(${r},${g},${b})`;
  }

  function depthWidth(depth) {
    const t = MAX_DEPTH > 0 ? depth / MAX_DEPTH : 0;
    return WIDTH_MIN + t * (WIDTH_MAX - WIDTH_MIN);
  }

  function applyRiverStyle(depth) {
    ctx.strokeStyle = depthColor(depth);
    ctx.lineWidth   = depthWidth(depth);
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
  }

  // Nakreslí polygon obce
  function drawCommune() {
    ctx.beginPath();
    for (const f of COMMUNE_DATA.features) {
      const g = f.geometry;
      if (!g) continue;
      const polys = g.type === 'MultiPolygon' ? g.coordinates
                  : g.type === 'Polygon'       ? [g.coordinates]
                  : [];
      for (const poly of polys) {
        for (const ring of poly) {
          const [x0, y0] = project(ring[0][0], ring[0][1]);
          ctx.moveTo(x0, y0);
          for (let i = 1; i < ring.length; i++) {
            const [x, y] = project(ring[i][0], ring[i][1]);
            ctx.lineTo(x, y);
          }
          ctx.closePath();
        }
      }
    }
    ctx.fillStyle   = COMMUNE_FILL;
    ctx.fill('evenodd');
    ctx.strokeStyle = COMMUNE_LINE;
    ctx.lineWidth   = COMMUNE_WIDTH;
    ctx.stroke();
  }

  // Nakreslí celý tok
  function drawRiverFull(river) {
    const { coords, depth } = river;
    ctx.beginPath();
    const [x0, y0] = project(coords[0][0], coords[0][1]);
    ctx.moveTo(x0, y0);
    for (let i = 1; i < coords.length; i++) {
      const [x, y] = project(coords[i][0], coords[i][1]);
      ctx.lineTo(x, y);
    }
    applyRiverStyle(depth);
    ctx.stroke();
  }

  // Nakreslí tok do progress (0..1)
  function drawRiverPartial(river, progress) {
    if (progress <= 0) return;
    const { coords, depth } = river;
    const n      = coords.length;
    const target = progress * (n - 1);
    const full   = Math.floor(target);
    const frac   = target - full;

    ctx.beginPath();
    const [x0, y0] = project(coords[0][0], coords[0][1]);
    ctx.moveTo(x0, y0);

    for (let i = 1; i <= full && i < n; i++) {
      const [x, y] = project(coords[i][0], coords[i][1]);
      ctx.lineTo(x, y);
    }

    if (frac > 0.001 && full < n - 1) {
      const [xa, ya] = project(coords[full][0],     coords[full][1]);
      const [xb, yb] = project(coords[full + 1][0], coords[full + 1][1]);
      ctx.lineTo(xa + frac * (xb - xa), ya + frac * (yb - ya));
    }

    applyRiverStyle(depth);
    ctx.stroke();
  }

  // Pozadí + polygon obce
  function drawBackground() {
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawCommune();
  }

  // Statická finální mapa
  function drawStatic() {
    drawBackground();
    for (let d = 0; d <= MAX_DEPTH; d++) {
      for (const river of riversByDepth[d]) drawRiverFull(river);
    }
  }

  // ─────────────────────────────────────────
  //  ANIMACE
  // ─────────────────────────────────────────
  let currentDepth   = 0;
  let completedUpto  = -1;       // poslední plně dokončená úroveň
  let levelStartTime = null;
  let inGap          = false;    // mezera mezi úrovněmi
  let gapStartTime   = null;
  let animationDone  = false;

  const progressLabel = document.getElementById('progress-label');

  function redrawCompleted() {
    drawBackground();
    for (let d = 0; d <= completedUpto; d++) {
      for (const river of riversByDepth[d]) drawRiverFull(river);
    }
  }

  function animate(ts) {
    // Mezera mezi úrovněmi
    if (inGap) {
      if (ts - gapStartTime >= LEVEL_GAP_MS) {
        inGap = false;
        levelStartTime = ts;
      } else {
        requestAnimationFrame(animate);
        return;
      }
    }

    if (levelStartTime === null) levelStartTime = ts;

    const rivers   = riversByDepth[currentDepth];
    const duration = levelDurationMs(rivers.length);
    const elapsed  = ts - levelStartTime;
    const progress = Math.min(elapsed / duration, 1.0);

    // Překreslit pozadí + hotové úrovně
    redrawCompleted();

    // Animovat aktuální úroveň
    for (const river of rivers) drawRiverPartial(river, progress);

    // Úroveň dokončena?
    if (progress >= 1.0) {
      completedUpto = currentDepth;
      currentDepth++;

      if (currentDepth > MAX_DEPTH) {
        // Animace skončila — finální poster
        animationDone = true;
        drawStatic();
        progressLabel.style.opacity = '0';
        return;
      }

      // Krátká pauza před další úrovní
      inGap        = true;
      gapStartTime = ts;
    }

    requestAnimationFrame(animate);
  }

  // ─────────────────────────────────────────
  //  RESIZE
  // ─────────────────────────────────────────
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    project = makeProjection(canvas.width, canvas.height);
    if (animationDone) drawStatic();
  }

  window.addEventListener('resize', resize);

  // ─────────────────────────────────────────
  //  POZADÍ — VLNÍCÍ SE ČÁRY
  // ─────────────────────────────────────────
  const waveCanvas = document.getElementById('wave-canvas');
  const wctx       = waveCanvas.getContext('2d');

  const WAVE_LINES  = 14;
  const WAVE_AMP    = 11;
  const WAVE_FREQ   = 0.007;
  const WAVE_SPEED  = 0.00045;
  const WAVE_STEP   = 4;

  function resizeWave() {
    waveCanvas.width  = window.innerWidth;
    waveCanvas.height = window.innerHeight;
  }

  // Sestaví cestu polygonu obce pro ořez (inverzní clip — zbytek mimo obec)
  function buildCommuneClip(ctx2d, w, h) {
    ctx2d.beginPath();
    ctx2d.rect(0, 0, w, h);
    for (const f of COMMUNE_DATA.features) {
      const g = f.geometry;
      if (!g) continue;
      const polys = g.type === 'MultiPolygon' ? g.coordinates
                  : g.type === 'Polygon'       ? [g.coordinates]
                  : [];
      for (const poly of polys) {
        for (const ring of poly) {
          const [x0, y0] = project(ring[0][0], ring[0][1]);
          ctx2d.moveTo(x0, y0);
          for (let i = 1; i < ring.length; i++) {
            const [x, y] = project(ring[i][0], ring[i][1]);
            ctx2d.lineTo(x, y);
          }
          ctx2d.closePath();
        }
      }
    }
    ctx2d.clip('evenodd');
  }

  function drawWaves(ts) {
    const w = waveCanvas.width;
    const h = waveCanvas.height;
    wctx.clearRect(0, 0, w, h);

    wctx.save();
    buildCommuneClip(wctx, w, h);

    const phase = ts * WAVE_SPEED;

    for (let i = 0; i < WAVE_LINES; i++) {
      const t          = i / (WAVE_LINES - 1);
      const y0         = h * 0.04 + h * 0.92 * t;
      const phaseShift = i * 0.72 + t * 2.1;
      const alpha      = 0.10 + 0.06 * Math.sin(t * Math.PI);
      const lw         = 1.2 + 0.9 * t;

      wctx.beginPath();
      for (let x = 0; x <= w; x += WAVE_STEP) {
        const y = y0 + WAVE_AMP * Math.sin(WAVE_FREQ * x + phase + phaseShift);
        x === 0 ? wctx.moveTo(x, y) : wctx.lineTo(x, y);
      }
      wctx.strokeStyle = `rgba(74,127,165,${alpha})`;
      wctx.lineWidth   = lw;
      wctx.stroke();
    }

    wctx.restore();
    requestAnimationFrame(drawWaves);
  }

  window.addEventListener('resize', resizeWave);

  // ─────────────────────────────────────────
  //  START
  // ─────────────────────────────────────────
  resize();
  resizeWave();
  requestAnimationFrame(animate);
  requestAnimationFrame(drawWaves);
  </script>
</body>
</html>
